<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#F5EDD8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Projeto Guguita">
<meta name="description" content="Projeto Guguita: vídeos, joguinhos e ideias para aprender brincando.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/img/capa-guga.jpg">
<link rel="stylesheet" href="assets/css/base.css">
<title>Projeto Guguita</title>
<style>
/* Estilos específicos do index — complementam base.css */
.wrap { width: min(640px,100%); min-height: calc(100vh - 44px); justify-content: center; }
.links { display: grid; gap: 13px; }
.link {
  display: flex;
  align-items: center;
  gap: 14px;
  min-height: 92px;
  padding: 14px;
  color: inherit;
  text-decoration: none;
  background: var(--branco);
  border: 3px solid var(--bege-esc);
  border-radius: 20px;
  box-shadow: 0 6px 0 var(--bege-esc), 0 9px 20px rgba(0,0,0,.07);
  transition: transform .1s, box-shadow .1s;
}
.link:active { transform: translateY(5px); box-shadow: 0 1px 0 var(--bege-esc), 0 5px 12px rgba(0,0,0,.06); }
.icone {
  width: 64px; height: 64px;
  border-radius: 18px;
  display: grid; place-items: center;
  flex: 0 0 auto;
  color: #fff;
  font-family: 'Baloo 2', cursive;
  font-size: 28px; font-weight: 900;
  box-shadow: inset 0 -5px 0 rgba(0,0,0,.12);
}
.jogos   { border-color: var(--azul-cl); box-shadow: 0 6px 0 var(--azul-cl), 0 9px 20px rgba(47,127,192,.13); }
.jogos   .icone { background: var(--azul); }
.youtube .icone { background: var(--vermelho); }
.instagram .icone { background: var(--rosa); }
.tiktok  .icone { background: #202020; }
.nome {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(24px,6vw,34px);
  line-height: 1.02; font-weight: 900;
  color: var(--marrom);
}
.desc {
  margin-top: 3px;
  font-size: clamp(14px,3.8vw,17px);
  line-height: 1.25; font-weight: 800;
  color: var(--cinza);
}
@media (max-width:520px) {
  body { padding: 14px 10px; }
  .wrap { justify-content: flex-start; min-height: auto; }
  .topo { align-items: flex-start; border-radius: 18px; }
  .capa { width: 78px; height: 78px; border-radius: 16px; }
  .link { min-height: 84px; border-radius: 18px; padding: 13px; gap: 12px; }
  .icone { width: 58px; height: 58px; border-radius: 15px; font-size: 25px; }
}
</style>

<!-- Google Analytics 4 — Projeto Guguita -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-357V6NBRQ1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-357V6NBRQ1');
</script>
</head>
<body>
  <main class="wrap">
    <header class="topo">
      <img class="capa" src="assets/img/capa-guga.jpg" alt="Projeto Guguita">
      <div>
        <h1 class="titulo">Projeto <span>Guguita</span></h1>
        <p class="sub">Vídeos, joguinhos e ideias para aprender brincando.</p>
      </div>
    </header>

    <section class="links" aria-label="Links do Projeto Guguita">
      <a class="link jogos" href="jogos.html">
        <div class="icone">J</div>
        <div>
          <h2 class="nome">Joguinhos</h2>
          <p class="desc">Acesse todos os jogos e calculadoras.</p>
        </div>
      </a>

      <a class="link youtube" href="https://www.youtube.com/@ProjetoGuguita" target="_blank" rel="noopener">
        <div class="icone">YT</div>
        <div>
          <h2 class="nome">YouTube</h2>
          <p class="desc">Assista aos vídeos do Projeto Guguita.</p>
        </div>
      </a>

      <a class="link instagram" href="https://www.instagram.com/projetoguguita/" target="_blank" rel="noopener">
        <div class="icone">IG</div>
        <div>
          <h2 class="nome">Instagram</h2>
          <p class="desc">Acompanhe novidades e bastidores.</p>
        </div>
      </a>

      <a class="link tiktok" href="https://www.tiktok.com/@projeto_guguita" target="_blank" rel="noopener">
        <div class="icone">TT</div>
        <div>
          <h2 class="nome">TikTok</h2>
          <p class="desc">Vídeos curtos do projeto.</p>
        </div>
      </a>
    </section>

    <p class="rodape">@projetoguguita</p>
  </main>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
}
</script>
</body>
</html>
