<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#F5EDD8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Projeto Guguita">
<meta name="description" content="Projeto Guguita: vídeos, joguinhos e redes sociais.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="capa-guga.jpg">
<title>Projeto Guguita</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap');
:root{
  --creme:#F5EDD8;
  --branco:#FFFDF8;
  --bege:#E8D9B8;
  --bege-esc:#C8B890;
  --marrom:#8B5E3C;
  --azul:#2F7FC0;
  --azul-cl:#5BA8E0;
  --azul-esc:#1A5A90;
  --verde:#4A9B6F;
  --vermelho:#C84040;
  --laranja:#D4733A;
  --rosa:#D963A5;
  --roxo:#7C5AC7;
  --texto:#2A1A0A;
  --cinza:#8A7A6A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;
  font-family:'Nunito',sans-serif;
  background:var(--creme);
  color:var(--texto);
  padding:22px 14px;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 15% 8%,rgba(196,137,90,.14),transparent 48%),
    radial-gradient(ellipse at 85% 92%,rgba(47,127,192,.10),transparent 50%);
  pointer-events:none;
}
.wrap{
  position:relative;
  z-index:1;
  width:min(640px,100%);
  min-height:calc(100vh - 44px);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:18px;
}
.topo{
  display:flex;
  align-items:center;
  gap:16px;
  background:var(--branco);
  border:3px solid var(--bege-esc);
  border-radius:22px;
  padding:14px;
  box-shadow:0 6px 0 var(--bege-esc),0 12px 24px rgba(139,94,60,.12);
}
.capa{
  width:98px;
  height:98px;
  border-radius:20px;
  object-fit:cover;
  border:3px solid var(--bege);
  flex:0 0 auto;
}
.titulo{
  font-family:'Baloo 2',cursive;
  font-size:clamp(34px,9vw,58px);
  line-height:.92;
  font-weight:900;
  color:var(--marrom);
}
.titulo span{color:var(--azul)}
.sub{
  margin-top:6px;
  color:var(--cinza);
  font-size:clamp(16px,4vw,20px);
  font-weight:800;
  line-height:1.25;
}
.links{
  display:grid;
  gap:13px;
}
.link{
  display:flex;
  align-items:center;
  gap:14px;
  min-height:92px;
  padding:14px;
  color:inherit;
  text-decoration:none;
  background:var(--branco);
  border:3px solid var(--bege-esc);
  border-radius:20px;
  box-shadow:0 6px 0 var(--bege-esc),0 9px 20px rgba(0,0,0,.07);
  transition:transform .1s,box-shadow .1s;
}
.link:active{
  transform:translateY(5px);
  box-shadow:0 1px 0 var(--bege-esc),0 5px 12px rgba(0,0,0,.06);
}
.icone{
  width:64px;
  height:64px;
  border-radius:18px;
  display:grid;
  place-items:center;
  flex:0 0 auto;
  color:#fff;
  font-family:'Baloo 2',cursive;
  font-size:28px;
  font-weight:900;
  box-shadow:inset 0 -5px 0 rgba(0,0,0,.12);
}
.jogos{border-color:var(--azul-cl);box-shadow:0 6px 0 var(--azul-cl),0 9px 20px rgba(47,127,192,.13)}
.jogos .icone{background:var(--azul)}
.youtube .icone{background:var(--vermelho)}
.instagram .icone{background:var(--rosa)}
.tiktok .icone{background:#202020}
.nome{
  font-family:'Baloo 2',cursive;
  font-size:clamp(24px,6vw,34px);
  line-height:1.02;
  font-weight:900;
  color:var(--marrom);
}
.desc{
  margin-top:3px;
  font-size:clamp(14px,3.8vw,17px);
  line-height:1.25;
  font-weight:800;
  color:var(--cinza);
}
.rodape{
  text-align:center;
  color:var(--cinza);
  font-size:14px;
  font-weight:800;
}
@media (max-width:520px){
  body{padding:14px 10px}
  .wrap{justify-content:flex-start;min-height:auto}
  .topo{align-items:flex-start;border-radius:18px}
  .capa{width:78px;height:78px;border-radius:16px}
  .link{min-height:84px;border-radius:18px;padding:13px;gap:12px}
  .icone{width:58px;height:58px;border-radius:15px;font-size:25px}
}
</style>
</head>
<body>
  <main class="wrap">
    <header class="topo">
      <img class="capa" src="capa-guga.jpg" alt="Projeto Guguita">
      <div>
        <h1 class="titulo">Projeto <span>Guguita</span></h1>
        <p class="sub">Vídeos, joguinhos e ideias para aprender brincando.</p>
      </div>
    </header>

    <section class="links" aria-label="Links do Projeto Guguita">
      <a class="link jogos" href="jogos.html">
        <div class="icone">J</div>
        <div>
          <h2 class="nome">Joguinhos</h2>
          <p class="desc">Acesse todos os jogos e calculadoras.</p>
        </div>
      </a>

      <a class="link youtube" href="https://www.youtube.com/@ProjetoGuguita" target="_blank" rel="noopener">
        <div class="icone">YT</div>
        <div>
          <h2 class="nome">YouTube</h2>
          <p class="desc">Assista aos vídeos do Projeto Guguita.</p>
        </div>
      </a>

      <a class="link instagram" href="https://www.instagram.com/projetoguguita/" target="_blank" rel="noopener">
        <div class="icone">IG</div>
        <div>
          <h2 class="nome">Instagram</h2>
          <p class="desc">Acompanhe novidades e bastidores.</p>
        </div>
      </a>

      <a class="link tiktok" href="https://www.tiktok.com/@projetoguguita" target="_blank" rel="noopener">
        <div class="icone">TT</div>
        <div>
          <h2 class="nome">TikTok</h2>
          <p class="desc">Vídeos curtos do projeto.</p>
        </div>
      </a>
    </section>

    <p class="rodape">@projetoguguita</p>
  </main>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
}
</script>
</body>
</html>
