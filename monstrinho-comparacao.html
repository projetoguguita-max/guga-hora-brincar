<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F5EDD8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Guga e Papai">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="capa-guga.jpg">
<title>Monstrinho da Comparacao</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap');
:root{--creme:#F5EDD8;--branco:#FFFDF8;--bege:#E8D9B8;--bege-esc:#C8B890;--marrom:#8B5E3C;--marrom-cl:#C4895A;--azul:#2F7FC0;--azul-cl:#5BA8E0;--azul-esc:#1A5A90;--verde:#4A9B6F;--verde-cl:#7DC49A;--verde-esc:#236b45;--laranja:#D4733A;--roxo:#7A5AB8;--texto:#2A1A0A;--cinza:#8A7A6A;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;font-family:'Nunito',sans-serif;background:radial-gradient(ellipse at 18% 8%,rgba(196,137,90,.14),transparent 48%),radial-gradient(ellipse at 82% 92%,rgba(47,127,192,.12),transparent 50%),var(--creme);color:var(--texto);overflow-x:hidden}
main{min-height:100vh;width:min(100%,920px);margin:0 auto;padding:18px 14px 24px;display:flex;flex-direction:column;gap:14px}
.topo{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}.capa{width:86px;height:86px;border-radius:20px;object-fit:cover;border:4px solid var(--bege-esc);box-shadow:0 8px 24px rgba(139,94,60,.22)}
.titulo{font-family:'Baloo 2',cursive;font-size:clamp(30px,7vw,52px);line-height:1;font-weight:900;color:var(--marrom)}.titulo span{color:var(--azul)}.sub{margin-top:4px;color:var(--cinza);font-size:16px;font-weight:800}
.painel{background:var(--branco);border:3px solid var(--bege-esc);border-radius:20px;box-shadow:0 5px 0 var(--bege-esc),0 8px 22px rgba(0,0,0,.06)}
.config{padding:14px;display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:900;color:var(--marrom);text-transform:uppercase;letter-spacing:.3px}
select{width:100%;height:58px;border:3px solid var(--azul-cl);border-radius:15px;background:var(--branco);color:var(--texto);font:900 28px 'Nunito',sans-serif;text-align:center;outline:none}
button{border:none;border-radius:99px;font:900 18px 'Nunito',sans-serif;cursor:pointer;transition:transform .1s,box-shadow .1s;touch-action:manipulation}button:active{transform:translateY(3px)}.btn-pronto{min-height:58px;padding:0 24px;background:var(--marrom-cl);color:white;box-shadow:0 5px 0 var(--marrom)}
.mesa{padding:16px;display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center}.lado{min-height:280px;border-radius:18px;border:3px solid var(--azul-cl);background:linear-gradient(135deg,rgba(47,127,192,.10),rgba(125,196,154,.12));display:flex;align-items:center;justify-content:center;padding:12px}.meio{min-width:170px;display:grid;justify-items:center;gap:10px}
.monstro{width:138px;height:138px;position:relative;border:5px solid var(--verde-esc);border-radius:44% 44% 50% 50%;background:radial-gradient(circle at 31% 27%,rgba(255,255,255,.78),transparent 18%),linear-gradient(180deg,var(--verde-cl),var(--verde));box-shadow:0 8px 0 var(--verde-esc),0 12px 20px rgba(35,107,69,.18);transition:transform .22s ease}.monstro::before,.monstro::after{content:"";position:absolute;top:34px;width:24px;height:24px;border-radius:50%;background:var(--branco);border:3px solid var(--verde-esc)}.monstro::before{left:34px}.monstro::after{right:34px}.olho{position:absolute;top:44px;width:8px;height:8px;border-radius:50%;background:var(--texto);z-index:1}.olho.um{left:46px}.olho.dois{right:46px}.boca{position:absolute;left:30px;right:30px;bottom:28px;height:34px;border-radius:6px 6px 26px 26px;background:var(--texto);overflow:hidden}.boca::after{content:"";position:absolute;left:18px;bottom:0;width:38px;height:15px;border-radius:20px 20px 0 0;background:#f6a2aa}.monstro.maior{transform:rotate(90deg) scale(1.04)}.monstro.menor{transform:rotate(-90deg) scale(1.04)}.monstro.igual{transform:scale(1.04)}
.sinal-grande{min-width:120px;min-height:72px;display:grid;place-items:center;border-radius:18px;border:3px solid var(--bege-esc);background:#fffaf0;color:var(--azul-esc);font-family:'Baloo 2',cursive;font-size:58px;font-weight:900;line-height:1}.personagem{display:grid;justify-items:center;gap:12px}.numero{min-width:110px;height:90px;padding:0 18px;display:grid;place-items:center;border-radius:22px;background:var(--branco);border:5px solid var(--azul-esc);color:var(--azul-esc);font-family:'Baloo 2',cursive;font-size:64px;line-height:1;font-weight:900;box-shadow:0 6px 0 var(--azul-esc)}.barras{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:260px}.barra{width:18px;height:44px;border-radius:8px;border:2px solid var(--marrom);background:var(--laranja);box-shadow:0 3px 0 var(--marrom)}
.respostas{padding:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.btn-resposta{min-height:76px;padding:8px 12px;color:white;border-radius:20px;display:grid;place-items:center}.btn-resposta .simbolo{font-family:'Baloo 2',cursive;font-size:38px;line-height:.85}.btn-resposta .nome{font-size:16px;text-transform:uppercase;letter-spacing:.2px}.btn-menor{background:var(--roxo);box-shadow:0 6px 0 #51368a}.btn-igual{background:var(--verde);box-shadow:0 6px 0 var(--verde-esc)}.btn-maior{background:var(--azul);box-shadow:0 6px 0 var(--azul-esc)}
.resultado{display:none;padding:16px;text-align:center}.resultado.ativo{display:block}.resultado h2{font-family:'Baloo 2',cursive;font-size:42px;color:var(--verde-esc);line-height:1.05}.resultado p{margin-top:4px;font-size:24px;font-weight:900;color:var(--texto)}.acoes{margin-top:12px;display:flex;flex-wrap:wrap;justify-content:center;gap:10px}.btn-novo,.btn-repetir{min-height:52px;padding:0 26px;color:white}.btn-novo{background:var(--azul);box-shadow:0 5px 0 var(--azul-esc)}.btn-repetir{background:var(--verde);box-shadow:0 5px 0 var(--verde-esc)}.tentar{border-color:var(--laranja);box-shadow:0 5px 0 var(--laranja),0 8px 22px rgba(0,0,0,.06)}.tentar h2{color:var(--laranja)}
@media(max-width:760px){main{padding:14px 10px 20px}.topo{grid-template-columns:72px 1fr;gap:10px}.capa{width:72px;height:72px;border-radius:17px}.config{grid-template-columns:1fr 1fr}.btn-pronto{grid-column:1/-1}.mesa{grid-template-columns:1fr;gap:10px;padding:12px}.lado{min-height:210px}.meio{min-width:0;order:2}.lado:first-child{order:1}.lado:last-child{order:3}.monstro{width:112px;height:112px}.respostas{grid-template-columns:1fr;gap:9px}.btn-resposta{min-height:62px}}
</style>
</head>
<body>
<main>
  <section class="topo"><img class="capa" src="capa-guga.jpg" alt="Guga"><div><h1 class="titulo">Monstrinho da <span>comparacao</span></h1><p class="sub">Escolha numeros ate 100 e toque no sinal certo.</p></div></section>
  <section class="painel config" aria-label="Escolher numeros"><label>Lado esquerdo<select id="esquerda"></select></label><label>Lado direito<select id="direita"></select></label><button class="btn-pronto" id="montar" type="button">Montar</button></section>
  <section class="painel mesa" aria-live="polite"><div class="lado" id="lado-esquerdo"></div><div class="meio"><div class="monstro" id="monstro" aria-label="Monstrinho da comparacao"><span class="olho um"></span><span class="olho dois"></span><span class="boca"></span></div><div class="sinal-grande" id="sinal">?</div></div><div class="lado" id="lado-direito"></div></section>
  <section class="painel respostas" aria-label="Escolher comparacao"><button class="btn-resposta btn-menor" type="button" data-resposta="<"><span class="simbolo">&lt;</span><span class="nome">Menor</span></button><button class="btn-resposta btn-igual" type="button" data-resposta="="><span class="simbolo">=</span><span class="nome">Igual</span></button><button class="btn-resposta btn-maior" type="button" data-resposta=">"><span class="simbolo">&gt;</span><span class="nome">Maior</span></button></section>
  <section class="painel resultado" id="resultado" aria-live="polite"><h2 id="titulo-resultado">Muito bem!</h2><p id="texto-resultado">7 e maior que 3.</p><div class="acoes"><button class="btn-repetir" id="repetir" type="button">Fazer de novo</button><button class="btn-novo" id="novo" type="button">Nova dupla</button></div></section>
</main>
<script>
const esquerdaEl=document.getElementById('esquerda'), direitaEl=document.getElementById('direita'), ladoEsquerdoEl=document.getElementById('lado-esquerdo'), ladoDireitoEl=document.getElementById('lado-direito'), sinalEl=document.getElementById('sinal'), monstroEl=document.getElementById('monstro'), resultadoEl=document.getElementById('resultado'), tituloResultadoEl=document.getElementById('titulo-resultado'), textoResultadoEl=document.getElementById('texto-resultado');
let esquerda=7,direita=3,sinalCorreto='>';
function popular(){for(let i=1;i<=100;i++){const a=document.createElement('option');a.value=i;a.textContent=i;esquerdaEl.appendChild(a);const b=document.createElement('option');b.value=i;b.textContent=i;direitaEl.appendChild(b);} esquerdaEl.value=esquerda;direitaEl.value=direita;}
function personagem(n){const wrap=document.createElement('div');wrap.className='personagem';const barras=document.createElement('div');barras.className='barras';for(let i=0;i<Math.min(20,n);i++){const bar=document.createElement('span');bar.className='barra';barras.appendChild(bar);} const numero=document.createElement('div');numero.className='numero';numero.textContent=n;wrap.appendChild(barras);wrap.appendChild(numero);return wrap;}
function comparar(){if(esquerda<direita)return '<'; if(esquerda>direita)return '>'; return '=';}
function frase(s){if(s==='<')return `${esquerda} e menor que ${direita}.`; if(s==='>')return `${esquerda} e maior que ${direita}.`; return `${esquerda} e igual a ${direita}.`;}
function apontar(s){monstroEl.classList.remove('menor','maior','igual'); if(s==='<')monstroEl.classList.add('menor'); if(s==='>')monstroEl.classList.add('maior'); if(s==='=')monstroEl.classList.add('igual');}
function montar(){esquerda=parseInt(esquerdaEl.value,10);direita=parseInt(direitaEl.value,10);sinalCorreto=comparar();ladoEsquerdoEl.innerHTML='';ladoDireitoEl.innerHTML='';ladoEsquerdoEl.appendChild(personagem(esquerda));ladoDireitoEl.appendChild(personagem(direita));sinalEl.textContent='?';monstroEl.classList.remove('menor','maior','igual');resultadoEl.classList.remove('ativo','tentar');}
function responder(resp){sinalEl.textContent=resp;if(resp===sinalCorreto){apontar(resp);resultadoEl.classList.remove('tentar');tituloResultadoEl.textContent='Muito bem!';textoResultadoEl.textContent=frase(resp);resultadoEl.classList.add('ativo');}else{monstroEl.classList.remove('menor','maior','igual');resultadoEl.classList.add('tentar','ativo');tituloResultadoEl.textContent='Tente de novo';textoResultadoEl.textContent='Olhe qual lado tem mais bloquinhos.';}}
function nova(){esquerdaEl.value=Math.floor(Math.random()*100)+1;direitaEl.value=Math.floor(Math.random()*100)+1;montar();}
document.getElementById('montar').addEventListener('click',montar);document.getElementById('repetir').addEventListener('click',montar);document.getElementById('novo').addEventListener('click',nova);esquerdaEl.addEventListener('change',montar);direitaEl.addEventListener('change',montar);document.querySelectorAll('[data-resposta]').forEach(btn=>btn.addEventListener('click',()=>responder(btn.dataset.resposta)));popular();montar();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js'));}
</script>
</body>
</html>
