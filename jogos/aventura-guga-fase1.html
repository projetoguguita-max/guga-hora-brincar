<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F5EDD8">
<title>Aventura do Guga - Fase 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap');
:root{
  --creme:#F5EDD8;--bege:#E8D9B8;--bege-esc:#C8B890;--marrom:#8B5E3C;
  --marrom-cl:#C4895A;--azul:#2F7FC0;--azul-cl:#5BA8E0;--azul-esc:#1A5A90;
  --verde:#4A9B6F;--verde-cl:#7DC49A;--verde-esc:#236b45;--amarelo:#E8B840;
  --laranja:#D4733A;--vermelho:#C84040;--texto:#2A1A0A;--cinza:#8A7A6A;--branco:#FFFDF8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;overscroll-behavior:none}
body{
  min-height:100vh;
  font-family:'Nunito',system-ui,sans-serif;
  background:
    radial-gradient(ellipse at 18% 8%,rgba(196,137,90,.14) 0%,transparent 48%),
    radial-gradient(ellipse at 82% 92%,rgba(47,127,192,.12) 0%,transparent 50%),
    var(--creme);
  color:var(--texto);
  overflow-x:hidden;
}
main{
  min-height:100vh;
  width:min(100%,980px);
  margin:0 auto;
  padding:16px 12px 18px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.topo{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:14px;
  align-items:center;
}
.capa{
  width:82px;
  height:82px;
  border-radius:20px;
  object-fit:cover;
  border:4px solid var(--bege-esc);
  box-shadow:0 8px 24px rgba(139,94,60,.22);
}
.titulo{
  font-family:'Baloo 2',cursive;
  font-size:clamp(30px,7vw,50px);
  line-height:1;
  font-weight:900;
  color:var(--marrom);
}
.titulo span{color:var(--azul)}
.sub{
  margin-top:4px;
  color:var(--cinza);
  font-size:clamp(15px,3.4vw,18px);
  line-height:1.2;
  font-weight:800;
}
.painel{
  background:var(--branco);
  border:3px solid var(--bege-esc);
  border-radius:20px;
  box-shadow:0 5px 0 var(--bege-esc),0 8px 22px rgba(0,0,0,.06);
}
.barra{
  padding:10px 12px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
}
.instrucao{
  font-size:clamp(18px,4vw,23px);
  font-weight:900;
  color:var(--marrom);
}
.estrelas{
  min-width:116px;
  min-height:54px;
  padding:4px 14px;
  display:grid;
  place-items:center;
  border-radius:16px;
  border:3px solid var(--azul-cl);
  background:linear-gradient(135deg,rgba(47,127,192,.10),rgba(232,184,64,.18));
  font-family:'Baloo 2',cursive;
  font-size:30px;
  font-weight:900;
  color:var(--azul-esc);
}
.jogo{
  position:relative;
  overflow:hidden;
  padding:10px;
}
.canvas-wrap{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  min-height:330px;
  max-height:min(62vh,560px);
  border-radius:18px;
  border:3px solid var(--azul-cl);
  overflow:hidden;
  background:#cfeeff;
}
canvas{
  width:100%;
  height:100%;
  display:block;
  touch-action:none;
}
.controles{
  padding:12px 8px 0;
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr;
  gap:10px;
}
button{
  border:none;
  border-radius:99px;
  font:900 18px 'Nunito',sans-serif;
  cursor:pointer;
  transition:transform .1s,box-shadow .1s,opacity .15s,filter .15s;
  touch-action:manipulation;
  user-select:none;
}
button:active,.pressionado{transform:translateY(4px)}
.ctrl{
  min-height:64px;
  color:white;
  background:var(--azul);
  box-shadow:0 6px 0 var(--azul-esc);
  font-size:28px;
}
.ctrl.pular{
  background:var(--laranja);
  box-shadow:0 6px 0 #a0521a;
  font-size:22px;
}
.btn-novo,.btn-repetir,.opcao{
  min-height:58px;
  padding:0 22px;
  color:white;
}
.btn-novo{background:var(--verde);box-shadow:0 5px 0 var(--verde-esc)}
.btn-repetir{background:var(--marrom-cl);box-shadow:0 5px 0 var(--marrom)}
.opcao{background:var(--azul);box-shadow:0 5px 0 var(--azul-esc);font-size:26px}
.modal{
  position:fixed;
  inset:0;
  z-index:10;
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  background:rgba(42,26,10,.22);
}
.modal.ativo{display:flex}
.modal-video{
  background:rgba(42,26,10,.42);
}
.desafio{
  width:min(520px,100%);
  padding:18px;
  text-align:center;
}
.comemoracao{
  width:min(720px,100%);
  padding:16px;
  text-align:center;
}
.comemoracao h2{
  font-family:'Baloo 2',cursive;
  font-size:clamp(34px,8vw,52px);
  line-height:1;
  color:var(--verde-esc);
}
.video-box{
  margin:12px auto;
  overflow:hidden;
  border-radius:18px;
  border:3px solid var(--bege-esc);
  background:#000;
  box-shadow:0 5px 0 var(--bege-esc),0 8px 18px rgba(0,0,0,.10);
}
.video-box video{
  width:100%;
  display:block;
  max-height:62vh;
  background:#000;
}
.desafio h2{
  font-family:'Baloo 2',cursive;
  font-size:clamp(36px,9vw,54px);
  line-height:1;
  color:var(--marrom);
}
.desafio p{
  margin-top:6px;
  font-size:20px;
  font-weight:900;
  color:var(--cinza);
}
.conta{
  margin:14px auto;
  width:min(100%,360px);
  min-height:92px;
  display:grid;
  place-items:center;
  border-radius:18px;
  border:3px solid var(--azul-cl);
  background:linear-gradient(135deg,rgba(47,127,192,.10),rgba(125,196,154,.13));
  color:var(--azul-esc);
  font-family:'Baloo 2',cursive;
  font-size:56px;
  font-weight:900;
}
.opcoes{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.feedback{
  min-height:38px;
  margin-top:12px;
  font-size:24px;
  font-weight:900;
  color:var(--verde-esc);
}
.acoes{
  display:none;
  margin-top:10px;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.acoes.ativo{display:grid}
@media (max-width:620px){
  main{padding:10px 8px 14px;gap:10px}
  .topo{gap:10px}
  .capa{width:68px;height:68px;border-radius:16px}
  .barra{grid-template-columns:1fr;justify-items:stretch}
  .estrelas{min-width:0}
  .canvas-wrap{min-height:280px;aspect-ratio:4/3}
  .controles{grid-template-columns:1fr 1fr;gap:8px}
  .ctrl.pular{grid-column:1 / -1}
  .opcoes,.acoes{grid-template-columns:1fr}
}
@media (orientation:landscape) and (max-height:620px){
  main{padding:8px;gap:8px}
  .topo{grid-template-columns:60px 1fr}
  .capa{width:60px;height:60px;border-radius:15px}
  .sub{display:none}
  .canvas-wrap{max-height:58vh;min-height:260px}
  .controles{padding-top:8px}
  .ctrl{min-height:56px}
}
</style>
</head>
<body>
<main>
  <header class="topo">
    <img class="capa" src="../assets/img/capa-guga.jpg" alt="Guga e Papai">
    <div>
      <h1 class="titulo">Aventura do <span>Guga</span></h1>
      <p class="sub">Pegue as estrelas, chegue na porta e responda uma continha.</p>
    </div>
  </header>

  <section class="painel barra" aria-label="Objetivo da fase">
    <p class="instrucao" id="instrucao">Ande para a direita. Pegue 6 estrelas.</p>
    <div class="estrelas" id="placar">0 / 6</div>
  </section>

  <section class="painel jogo" aria-label="Fase de plataforma">
    <div class="canvas-wrap">
      <canvas id="tela" width="960" height="540" aria-label="Fase da aventura do Guga"></canvas>
    </div>
    <div class="controles" aria-label="Controles do jogo">
      <button class="ctrl" id="esq" aria-label="Andar para a esquerda">&larr;</button>
      <button class="ctrl" id="dir" aria-label="Andar para a direita">&rarr;</button>
      <button class="ctrl pular" id="pular" aria-label="Pular">Pular</button>
    </div>
  </section>
</main>

<div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="tituloDesafio">
  <section class="painel desafio">
    <h2 id="tituloDesafio">Desafio final</h2>
    <p>Quantas estrelas o Guga pegou?</p>
    <div class="conta" id="contaFinal">2 + 4 = ?</div>
    <div class="opcoes">
      <button class="opcao">5</button>
      <button class="opcao">6</button>
      <button class="opcao">7</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="acoes" id="acoes">
      <button class="btn-repetir" id="repetir">Jogar de novo</button>
      <button class="btn-novo" id="continuar">Muito bem!</button>
    </div>
  </section>
</div>

<div class="modal modal-video" id="modalVideo" role="dialog" aria-modal="true" aria-labelledby="tituloVideo">
  <section class="painel comemoracao">
    <h2 id="tituloVideo">Muito bem!</h2>
    <div class="video-box">
      <video id="videoMuitoBem" src="../assets/video/muito_bem.mp4" preload="auto" playsinline controls></video>
    </div>
    <button class="btn-novo" id="jogarDepoisVideo">Próxima fase</button>
  </section>
</div>

<script>
const canvas = document.getElementById('tela');
const ctx = canvas.getContext('2d');
const placar = document.getElementById('placar');
const instrucao = document.getElementById('instrucao');
const modal = document.getElementById('modal');
const modalVideo = document.getElementById('modalVideo');
const videoMuitoBem = document.getElementById('videoMuitoBem');
const contaFinal = document.getElementById('contaFinal');
const botaoDepoisVideo = document.getElementById('jogarDepoisVideo');
const feedback = document.getElementById('feedback');
const acoes = document.getElementById('acoes');

const W = canvas.width;
const H = canvas.height;
const chaves = { esquerda:false, direita:false, pular:false };
const mundo = { largura:2920, altura:H, camera:0, fim:false };
const gravidade = 0.58;
const atrito = 0.82;

const jogador = {
  x:70,y:330,w:46,h:58,vx:0,vy:0,noChao:false,virado:1
};

const fases = [
  {
    nome:'Fase 1',
    largura:2920,
    total:6,
    conta:'2 + 4 = ?',
    opcoes:[5,6,7],
    correta:6,
    plataformas:[
      {x:0,y:450,w:500,h:90,tipo:'grama'},
      {x:580,y:408,w:240,h:40,tipo:'grama'},
      {x:900,y:362,w:230,h:40,tipo:'madeira'},
      {x:1210,y:418,w:280,h:40,tipo:'grama'},
      {x:1580,y:370,w:220,h:40,tipo:'madeira'},
      {x:1890,y:430,w:360,h:90,tipo:'grama'},
      {x:2340,y:386,w:250,h:40,tipo:'madeira'},
      {x:2680,y:450,w:360,h:90,tipo:'grama'}
    ],
    estrelas:[
      {x:420,y:382,r:20,ativa:true},
      {x:700,y:342,r:20,ativa:true},
      {x:1015,y:300,r:20,ativa:true},
      {x:1350,y:354,r:20,ativa:true},
      {x:1695,y:308,r:20,ativa:true},
      {x:2460,y:322,r:20,ativa:true}
    ],
    blocos:[
      {x:520,y:382,w:48,h:48,cor:'#E8B840',impulso:true},
      {x:1138,y:314,w:48,h:48,cor:'#D4733A',impulso:true},
      {x:1810,y:322,w:48,h:48,cor:'#5BA8E0',impulso:true},
      {x:2260,y:382,w:48,h:48,cor:'#E8B840',impulso:true}
    ],
    decoracoes:[
      {tipo:'placa',x:170,y:386,texto:'Vai!'},
      {tipo:'arbusto',x:360,y:420,s:1},
      {tipo:'arvore',x:760,y:320,s:.9},
      {tipo:'placa',x:1216,y:354,texto:'+ pula'},
      {tipo:'arbusto',x:2050,y:400,s:1.1},
      {tipo:'arvore',x:2220,y:330,s:1},
      {tipo:'placa',x:2668,y:386,texto:'Porta'}
    ],
    porta:{x:2790,y:344,w:82,h:106}
  },
  {
    nome:'Fase 2',
    largura:3220,
    total:7,
    conta:'3 + 4 = ?',
    opcoes:[6,7,8],
    correta:7,
    plataformas:[
      {x:0,y:450,w:430,h:90,tipo:'grama'},
      {x:520,y:390,w:230,h:40,tipo:'madeira'},
      {x:850,y:430,w:260,h:40,tipo:'grama'},
      {x:1210,y:350,w:230,h:40,tipo:'madeira'},
      {x:1510,y:408,w:230,h:40,tipo:'grama'},
      {x:1830,y:360,w:230,h:40,tipo:'madeira'},
      {x:2150,y:430,w:330,h:90,tipo:'grama'},
      {x:2580,y:382,w:250,h:40,tipo:'madeira'},
      {x:2980,y:450,w:340,h:90,tipo:'grama'}
    ],
    estrelas:[
      {x:360,y:382,r:20,ativa:true},
      {x:635,y:326,r:20,ativa:true},
      {x:980,y:365,r:20,ativa:true},
      {x:1325,y:286,r:20,ativa:true},
      {x:1630,y:346,r:20,ativa:true},
      {x:1945,y:296,r:20,ativa:true},
      {x:2700,y:318,r:20,ativa:true}
    ],
    blocos:[
      {x:455,y:402,w:48,h:48,cor:'#5BA8E0',impulso:true},
      {x:1135,y:396,w:48,h:48,cor:'#E8B840',impulso:true},
      {x:1760,y:398,w:48,h:48,cor:'#D4733A',impulso:true},
      {x:2505,y:382,w:48,h:48,cor:'#5BA8E0',impulso:true}
    ],
    decoracoes:[
      {tipo:'placa',x:150,y:386,texto:'Fase 2'},
      {tipo:'arbusto',x:330,y:420,s:1},
      {tipo:'arvore',x:900,y:330,s:.9},
      {tipo:'placa',x:1160,y:344,texto:'+ alto'},
      {tipo:'arbusto',x:2210,y:400,s:1.1},
      {tipo:'arvore',x:2440,y:330,s:1},
      {tipo:'placa',x:2940,y:386,texto:'Porta'}
    ],
    porta:{x:3090,y:344,w:82,h:106}
  },
  {
    nome:'Fase 3',
    largura:3520,
    total:8,
    conta:'5 + 3 = ?',
    opcoes:[7,8,9],
    correta:8,
    plataformas:[
      {x:0,y:450,w:430,h:90,tipo:'grama'},
      {x:540,y:410,w:220,h:40,tipo:'grama'},
      {x:850,y:360,w:210,h:40,tipo:'madeira'},
      {x:1160,y:420,w:260,h:40,tipo:'grama'},
      {x:1530,y:360,w:220,h:40,tipo:'madeira'},
      {x:1850,y:410,w:260,h:40,tipo:'grama'},
      {x:2220,y:345,w:220,h:40,tipo:'madeira'},
      {x:2520,y:430,w:330,h:90,tipo:'grama'},
      {x:2920,y:375,w:250,h:40,tipo:'madeira'},
      {x:3300,y:450,w:340,h:90,tipo:'grama'}
    ],
    estrelas:[
      {x:350,y:382,r:20,ativa:true},
      {x:660,y:348,r:20,ativa:true},
      {x:955,y:298,r:20,ativa:true},
      {x:1285,y:354,r:20,ativa:true},
      {x:1640,y:298,r:20,ativa:true},
      {x:1985,y:346,r:20,ativa:true},
      {x:2330,y:282,r:20,ativa:true},
      {x:3040,y:312,r:20,ativa:true}
    ],
    blocos:[
      {x:460,y:402,w:48,h:48,cor:'#E8B840',impulso:true},
      {x:1090,y:395,w:48,h:48,cor:'#D4733A',impulso:true},
      {x:1780,y:362,w:48,h:48,cor:'#5BA8E0',impulso:true},
      {x:2460,y:382,w:48,h:48,cor:'#E8B840',impulso:true},
      {x:3195,y:402,w:48,h:48,cor:'#D4733A',impulso:true}
    ],
    decoracoes:[
      {tipo:'placa',x:150,y:386,texto:'Fase 3'},
      {tipo:'arbusto',x:340,y:420,s:1},
      {tipo:'arvore',x:760,y:320,s:.9},
      {tipo:'placa',x:1120,y:356,texto:'Calma'},
      {tipo:'arbusto',x:1900,y:380,s:1.1},
      {tipo:'arvore',x:2600,y:330,s:1},
      {tipo:'placa',x:3260,y:386,texto:'Final'}
    ],
    porta:{x:3410,y:344,w:82,h:106}
  }
];

let faseAtual = 0;
let fase = fases[faseAtual];
let totalEstrelas = fase.total;
let plataformas = [];
let estrelas = [];
let blocos = [];
let decoracoes = [];
let porta = {};
let estrelasPegas = 0;
let ultimoTempo = 0;

function retangulosTocam(a,b){
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function estrelaTocada(e){
  const cx = jogador.x + jogador.w / 2;
  const cy = jogador.y + jogador.h / 2;
  const dx = cx - e.x;
  const dy = cy - e.y;
  return Math.sqrt(dx * dx + dy * dy) < e.r + 32;
}

function copiarLista(lista){
  return lista.map(item => ({...item}));
}

function carregarFase(){
  fase = fases[faseAtual];
  totalEstrelas = fase.total;
  mundo.largura = fase.largura;
  plataformas = copiarLista(fase.plataformas);
  estrelas = copiarLista(fase.estrelas);
  blocos = copiarLista(fase.blocos);
  decoracoes = copiarLista(fase.decoracoes);
  porta = {...fase.porta};
  contaFinal.textContent = fase.conta;
  document.getElementById('tituloDesafio').textContent = `Desafio da ${fase.nome}`;
  document.querySelectorAll('.opcao').forEach((btn, index) => {
    const valor = fase.opcoes[index];
    btn.textContent = valor;
    btn.dataset.resposta = String(valor);
  });
  botaoDepoisVideo.textContent = faseAtual < fases.length - 1 ? 'Próxima fase' : 'Jogar de novo';
}

function reiniciar(){
  carregarFase();
  jogador.x = 70;
  jogador.y = 330;
  jogador.vx = 0;
  jogador.vy = 0;
  mundo.camera = 0;
  mundo.fim = false;
  estrelasPegas = 0;
  estrelas.forEach(e => e.ativa = true);
  placar.textContent = `0 / ${totalEstrelas}`;
  instrucao.textContent = `${fase.nome}: pegue ${totalEstrelas} estrelas.`;
  modal.classList.remove('ativo');
  fecharVideoMuitoBem();
  feedback.textContent = '';
  acoes.classList.remove('ativo');
}

function atualizar(){
  if(mundo.fim) return;

  if(chaves.esquerda){
    jogador.vx -= 0.65;
    jogador.virado = -1;
  }
  if(chaves.direita){
    jogador.vx += 0.65;
    jogador.virado = 1;
  }
  if(chaves.pular && jogador.noChao){
    jogador.vy = -13.5;
    jogador.noChao = false;
  }

  jogador.vx = Math.max(-6.2, Math.min(6.2, jogador.vx));
  jogador.vy += gravidade;
  jogador.x += jogador.vx;
  jogador.vx *= atrito;

  if(jogador.x < 0) jogador.x = 0;
  if(jogador.x + jogador.w > mundo.largura) jogador.x = mundo.largura - jogador.w;

  jogador.y += jogador.vy;
  jogador.noChao = false;
  const apoios = plataformas.concat(blocos);
  for(const p of apoios){
    if(retangulosTocam(jogador,p) && jogador.vy >= 0){
      const anterior = jogador.y - jogador.vy + jogador.h;
      if(anterior <= p.y + 10){
        jogador.y = p.y - jogador.h;
        if(p.impulso){
          jogador.vy = -16.5;
          jogador.noChao = false;
          p.ativo = true;
          p.pulso = 12;
        }else{
          jogador.vy = 0;
          jogador.noChao = true;
        }
      }
    }
  }

  blocos.forEach(b => {
    if(b.pulso) b.pulso -= 1;
  });

  if(jogador.y > H + 120){
    jogador.x = Math.max(40, mundo.camera + 30);
    jogador.y = 260;
    jogador.vx = 0;
    jogador.vy = 0;
  }

  for(const e of estrelas){
    if(e.ativa && estrelaTocada(e)){
      e.ativa = false;
      estrelasPegas += 1;
      placar.textContent = `${estrelasPegas} / ${totalEstrelas}`;
      if(estrelasPegas === totalEstrelas){
        instrucao.textContent = 'Muito bem! Agora entre na porta.';
      }
    }
  }

  if(estrelasPegas === totalEstrelas && retangulosTocam(jogador,porta)){
    mundo.fim = true;
    abrirDesafio();
  }

  const alvo = jogador.x - W * 0.38;
  mundo.camera += (Math.max(0, Math.min(mundo.largura - W, alvo)) - mundo.camera) * 0.10;
}

function desenharCeu(){
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#bde8ff');
  grad.addColorStop(1,'#f8fbff');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = 'rgba(245,237,216,.72)';
  desenharColina(-120 - mundo.camera * .05,390,420,120);
  desenharColina(460 - mundo.camera * .05,410,520,100);
  desenharColina(1080 - mundo.camera * .05,398,460,112);

  ctx.fillStyle = 'rgba(125,196,154,.38)';
  desenharColina(60 - mundo.camera * .12,432,300,70);
  desenharColina(710 - mundo.camera * .12,438,360,76);
  desenharColina(1430 - mundo.camera * .12,426,330,80);

  ctx.fillStyle = 'rgba(255,253,248,.85)';
  desenharNuvem(130 - mundo.camera * .18,82,1);
  desenharNuvem(500 - mundo.camera * .10,126,.78);
  desenharNuvem(820 - mundo.camera * .16,72,.92);
  desenharNuvem(1410 - mundo.camera * .13,96,.82);
  desenharNuvem(2150 - mundo.camera * .11,118,.72);
}

function desenharColina(x,y,w,h){
  ctx.beginPath();
  ctx.ellipse(x + w / 2,y + h,w / 2,h,0,Math.PI,Math.PI * 2);
  ctx.lineTo(x + w,y + h + 80);
  ctx.lineTo(x,y + h + 80);
  ctx.closePath();
  ctx.fill();
}

function desenharNuvem(x,y,s){
  ctx.beginPath();
  ctx.arc(x,y,28*s,0,Math.PI*2);
  ctx.arc(x+32*s,y-10*s,36*s,0,Math.PI*2);
  ctx.arc(x+70*s,y,26*s,0,Math.PI*2);
  ctx.fill();
}

function desenharPlataformas(){
  for(const p of plataformas){
    const x = p.x - mundo.camera;
    const base = p.tipo === 'madeira' ? '#C4895A' : '#7DC49A';
    const lado = p.tipo === 'madeira' ? '#8B5E3C' : '#4A9B6F';
    const borda = p.tipo === 'madeira' ? '#6d3f25' : '#236b45';
    ctx.fillStyle = base;
    arredondar(x,p.y,p.w,p.h,16);
    ctx.fill();
    ctx.fillStyle = lado;
    arredondar(x,p.y + 16,p.w,p.h - 16,12);
    ctx.fill();
    ctx.strokeStyle = borda;
    ctx.lineWidth = 4;
    arredondar(x,p.y,p.w,p.h,16);
    ctx.stroke();

    if(p.tipo === 'madeira'){
      ctx.strokeStyle = 'rgba(255,253,248,.28)';
      ctx.lineWidth = 3;
      for(let i=22;i<p.w;i+=52){
        ctx.beginPath();
        ctx.moveTo(x+i,p.y+8);
        ctx.lineTo(x+i-10,p.y+p.h-8);
        ctx.stroke();
      }
    }else{
      ctx.fillStyle = 'rgba(255,253,248,.45)';
      for(let i=20;i<p.w;i+=54){
        ctx.beginPath();
        ctx.arc(x+i,p.y+11,4,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
}

function desenharBlocos(){
  for(const b of blocos){
    const x = b.x - mundo.camera;
    const subida = b.pulso ? Math.sin(b.pulso / 12 * Math.PI) * 8 : 0;
    const y = b.y - subida;
    ctx.fillStyle = b.cor;
    arredondar(x,y,b.w,b.h,10);
    ctx.fill();
    ctx.strokeStyle = '#8B5E3C';
    ctx.lineWidth = 4;
    arredondar(x,y,b.w,b.h,10);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,253,248,.48)';
    ctx.fillRect(x + 9,y + 9,12,9);
    ctx.strokeStyle = 'rgba(139,94,60,.55)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 8,y + 25);
    ctx.lineTo(x + b.w - 8,y + 25);
    ctx.moveTo(x + 24,y + 8);
    ctx.lineTo(x + 24,y + b.h - 8);
    ctx.stroke();

    ctx.fillStyle = '#FFFDF8';
    ctx.strokeStyle = '#8B5E3C';
    ctx.lineWidth = 3;
    ctx.font = "900 30px 'Baloo 2'";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText('+',x + b.w / 2,y + b.h / 2 + 1);
    ctx.fillText('+',x + b.w / 2,y + b.h / 2 + 1);
  }
}

function desenharDecoracoes(){
  for(const d of decoracoes){
    const x = d.x - mundo.camera;
    if(d.tipo === 'arbusto') desenharArbusto(x,d.y,d.s);
    if(d.tipo === 'arvore') desenharArvore(x,d.y,d.s);
    if(d.tipo === 'placa') desenharPlaca(x,d.y,d.texto);
  }
}

function desenharArbusto(x,y,s){
  ctx.fillStyle = '#4A9B6F';
  ctx.strokeStyle = '#236b45';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x,y,18*s,Math.PI,0);
  ctx.arc(x+22*s,y-8*s,22*s,Math.PI,0);
  ctx.arc(x+50*s,y,18*s,Math.PI,0);
  ctx.lineTo(x+68*s,y+20*s);
  ctx.lineTo(x-18*s,y+20*s);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

function desenharArvore(x,y,s){
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(x + 24*s,y + 54*s,28*s,72*s);
  ctx.fillStyle = '#4A9B6F';
  ctx.strokeStyle = '#236b45';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(x+22*s,y+44*s,30*s,0,Math.PI*2);
  ctx.arc(x+54*s,y+34*s,34*s,0,Math.PI*2);
  ctx.arc(x+82*s,y+52*s,28*s,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();
}

function desenharPlaca(x,y,texto){
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(x+36,y+42,12,52);
  ctx.fillStyle = '#FFFDF8';
  arredondar(x,y,84,50,12);
  ctx.fill();
  ctx.strokeStyle = '#C8B890';
  ctx.lineWidth = 4;
  arredondar(x,y,84,50,12);
  ctx.stroke();
  ctx.fillStyle = '#8B5E3C';
  ctx.font = "900 18px 'Nunito'";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(texto,x+42,y+26);
}

function desenharEstrela(e){
  if(!e.ativa) return;
  const x = e.x - mundo.camera;
  const y = e.y;
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(performance.now() / 900);
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const r = i % 2 === 0 ? e.r : e.r * .48;
    const a = -Math.PI / 2 + i * Math.PI / 5;
    ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle = '#E8B840';
  ctx.strokeStyle = '#8B5E3C';
  ctx.lineWidth = 3;
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function desenharPorta(){
  const x = porta.x - mundo.camera;
  ctx.fillStyle = 'rgba(42,26,10,.15)';
  ctx.beginPath();
  ctx.ellipse(x + porta.w / 2,porta.y + porta.h + 5,54,12,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = estrelasPegas === totalEstrelas ? '#E8B840' : '#C8B890';
  ctx.beginPath();
  ctx.moveTo(x - 8,porta.y + 8);
  ctx.lineTo(x + porta.w / 2,porta.y - 42);
  ctx.lineTo(x + porta.w + 8,porta.y + 8);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#8B5E3C';
  ctx.lineWidth = 4;
  ctx.stroke();

  ctx.fillStyle = '#C4895A';
  arredondar(x,porta.y,porta.w,porta.h,18);
  ctx.fill();
  ctx.fillStyle = '#8B5E3C';
  arredondar(x + 9,porta.y + 10,porta.w - 18,porta.h - 10,13);
  ctx.fill();
  ctx.fillStyle = estrelasPegas === totalEstrelas ? '#E8B840' : '#C8B890';
  ctx.beginPath();
  ctx.arc(x + 59,porta.y + 58,7,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#5b351f';
  ctx.lineWidth = 4;
  arredondar(x,porta.y,porta.w,porta.h,18);
  ctx.stroke();

  ctx.fillStyle = '#FFFDF8';
  ctx.font = "900 18px 'Nunito'";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(estrelasPegas === totalEstrelas ? 'ENTRAR' : `${totalEstrelas - estrelasPegas} FALTAM`,x + porta.w / 2,porta.y + 28);
}

function desenharJogador(){
  const x = jogador.x - mundo.camera;
  const y = jogador.y;
  ctx.fillStyle = 'rgba(42,26,10,.16)';
  ctx.beginPath();
  ctx.ellipse(x + jogador.w / 2,y + jogador.h + 7,30,8,0,0,Math.PI*2);
  ctx.fill();

  ctx.save();
  ctx.translate(x + jogador.w / 2, y + jogador.h / 2);
  ctx.scale(jogador.virado,1);
  ctx.translate(-jogador.w / 2, -jogador.h / 2);

  ctx.fillStyle = '#2F7FC0';
  ctx.strokeStyle = '#1A5A90';
  ctx.lineWidth = 4;
  arredondar(5,30,36,24,10);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#FFFDF8';
  ctx.strokeStyle = '#C8B890';
  ctx.lineWidth = 3;
  arredondar(8,27,30,25,12);
  ctx.fill();
  ctx.stroke();
  desenharFitaCamisa(23,39,.34);

  ctx.strokeStyle = '#8B5E3C';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(9,36);
  ctx.lineTo(1,45);
  ctx.moveTo(38,36);
  ctx.lineTo(46,45);
  ctx.stroke();

  ctx.fillStyle = '#D4733A';
  ctx.fillRect(10,50,10,8);
  ctx.fillRect(27,50,10,8);

  ctx.fillStyle = '#F3C48A';
  ctx.strokeStyle = '#8B5E3C';
  ctx.lineWidth = 3;
  arredondar(6,6,34,32,16);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#F3C48A';
  ctx.strokeStyle = '#8B5E3C';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(7,22,5,0,Math.PI*2);
  ctx.arc(39,22,5,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#A86932';
  ctx.beginPath();
  ctx.moveTo(7,14);
  ctx.quadraticCurveTo(13,0,28,5);
  ctx.quadraticCurveTo(39,8,41,18);
  ctx.quadraticCurveTo(32,13,27,18);
  ctx.quadraticCurveTo(22,11,15,19);
  ctx.quadraticCurveTo(13,15,7,21);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#7B4A26';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255,253,248,.36)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(16,10);
  ctx.quadraticCurveTo(21,7,26,8);
  ctx.moveTo(25,11);
  ctx.quadraticCurveTo(30,9,35,12);
  ctx.stroke();

  ctx.fillStyle = '#FFFDF8';
  ctx.strokeStyle = '#1A5A90';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(17,22,5,0,Math.PI*2);
  ctx.arc(30,22,5,0,Math.PI*2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#2F7FC0';
  ctx.beginPath();
  ctx.arc(18,22,2.6,0,Math.PI*2);
  ctx.arc(31,22,2.6,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#2A1A0A';
  ctx.beginPath();
  ctx.arc(18,22,1.1,0,Math.PI*2);
  ctx.arc(31,22,1.1,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = 'rgba(200,90,122,.45)';
  ctx.beginPath();
  ctx.arc(13,29,3,0,Math.PI*2);
  ctx.arc(35,29,3,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = '#2A1A0A';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(24,27,8,.12,Math.PI - .12);
  ctx.stroke();

  ctx.restore();
}

function desenharFitaCamisa(cx,cy,s){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(s,s);
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#2F7FC0';
  ctx.beginPath();
  ctx.moveTo(-20,-22);
  ctx.bezierCurveTo(-48,-48,-58,10,-10,8);
  ctx.stroke();
  ctx.strokeStyle = '#D4733A';
  ctx.beginPath();
  ctx.moveTo(20,-22);
  ctx.bezierCurveTo(48,-48,58,10,10,8);
  ctx.stroke();
  ctx.strokeStyle = '#E8B840';
  ctx.beginPath();
  ctx.moveTo(-10,8);
  ctx.lineTo(18,36);
  ctx.stroke();
  ctx.strokeStyle = '#4A9B6F';
  ctx.beginPath();
  ctx.moveTo(10,8);
  ctx.lineTo(-18,36);
  ctx.stroke();
  ctx.restore();
}

function arredondar(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function desenhar(){
  desenharCeu();
  desenharDecoracoes();
  desenharPlataformas();
  desenharBlocos();
  estrelas.forEach(desenharEstrela);
  desenharPorta();
  desenharJogador();
}

function ciclo(tempo){
  const delta = tempo - ultimoTempo;
  ultimoTempo = tempo;
  if(delta < 80) atualizar();
  desenhar();
  requestAnimationFrame(ciclo);
}

function abrirDesafio(){
  instrucao.textContent = 'Responda o desafio final.';
  modal.classList.add('ativo');
}

function abrirVideoMuitoBem(){
  modal.classList.remove('ativo');
  modalVideo.classList.add('ativo');
  videoMuitoBem.currentTime = 0;
  const tocando = videoMuitoBem.play();
  if(tocando && typeof tocando.catch === 'function'){
    tocando.catch(() => {
      feedback.textContent = 'Muito bem! Toque no vídeo para assistir.';
      modal.classList.add('ativo');
    });
  }
}

function avancarDepoisVideo(){
  if(faseAtual < fases.length - 1){
    faseAtual += 1;
  }else{
    faseAtual = 0;
  }
  reiniciar();
}

function fecharVideoMuitoBem(){
  videoMuitoBem.pause();
  videoMuitoBem.currentTime = 0;
  modalVideo.classList.remove('ativo');
}

function tocarControle(id, chave){
  const btn = document.getElementById(id);
  const ligar = ev => {
    ev.preventDefault();
    chaves[chave] = true;
    btn.classList.add('pressionado');
  };
  const desligar = ev => {
    ev.preventDefault();
    chaves[chave] = false;
    btn.classList.remove('pressionado');
  };
  btn.addEventListener('pointerdown', ligar);
  btn.addEventListener('pointerup', desligar);
  btn.addEventListener('pointercancel', desligar);
  btn.addEventListener('pointerleave', desligar);
}

tocarControle('esq','esquerda');
tocarControle('dir','direita');
tocarControle('pular','pular');

document.addEventListener('keydown', ev => {
  if(ev.key === 'ArrowLeft') chaves.esquerda = true;
  if(ev.key === 'ArrowRight') chaves.direita = true;
  if(ev.key === 'ArrowUp' || ev.key === ' '){
    ev.preventDefault();
    chaves.pular = true;
  }
});

document.addEventListener('keyup', ev => {
  if(ev.key === 'ArrowLeft') chaves.esquerda = false;
  if(ev.key === 'ArrowRight') chaves.direita = false;
  if(ev.key === 'ArrowUp' || ev.key === ' ') chaves.pular = false;
});

document.querySelectorAll('.opcao').forEach(btn => {
  btn.addEventListener('click', () => {
    const acertou = Number(btn.dataset.resposta) === fase.correta;
    if(acertou){
      feedback.textContent = 'Muito bem!';
      acoes.classList.add('ativo');
      abrirVideoMuitoBem();
    }else{
      feedback.textContent = `Tente de novo. O Guga pegou ${totalEstrelas} estrelas.`;
    }
  });
});

document.getElementById('repetir').addEventListener('click', reiniciar);
document.getElementById('continuar').addEventListener('click', reiniciar);
botaoDepoisVideo.addEventListener('click', avancarDepoisVideo);

reiniciar();
requestAnimationFrame(ciclo);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('../service-worker.js'));
}
</script>
