<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#F5EDD8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Guga e Papai">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../assets/img/capa-guga.jpg">
<title>Vamos somar: sobe um</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap');
:root{
  --creme:#F5EDD8;
  --branco:#FFFDF8;
  --bege:#E8D9B8;
  --bege-esc:#C8B890;
  --marrom:#8B5E3C;
  --azul:#2F7FC0;
  --azul-claro:#5BA8E0;
  --azul-esc:#1A5A90;
  --verde:#4A9B6F;
  --laranja:#D4733A;
  --indigo:#3752A3;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  min-height:100vh;
  background:linear-gradient(180deg,var(--creme),#efe3c4);
  color:var(--marrom);
  font-family:Nunito,system-ui,sans-serif;
  padding:12px;
}
.app{
  width:min(1120px,100%);
  height:calc(100vh - 24px);
  margin:0 auto;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:10px;
}
.topo{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:12px;
}
.capa{
  width:68px;
  height:68px;
  object-fit:cover;
  border-radius:18px;
  border:4px solid var(--branco);
  box-shadow:0 5px 0 var(--bege-esc),0 10px 20px rgba(94,65,34,.18);
}
.titulo{
  margin:0;
  font-family:"Baloo 2",Nunito,sans-serif;
  font-size:clamp(30px,5.2vw,54px);
  line-height:.9;
  letter-spacing:0;
}
.titulo span{color:var(--azul)}
.subtitulo{
  margin:2px 0 0;
  font-size:clamp(15px,2.2vw,19px);
  font-weight:900;
  color:#936846;
}
button{
  border:0;
  cursor:pointer;
  font-family:Nunito,system-ui,sans-serif;
  font-weight:900;
  color:var(--branco);
  transition:transform .12s ease,box-shadow .12s ease,filter .12s ease;
  -webkit-tap-highlight-color:transparent;
}
button:active{transform:translateY(3px);box-shadow:none}
button:disabled{
  cursor:default;
  opacity:.48;
  filter:saturate(.7);
  transform:none;
}
.btn{
  min-height:56px;
  padding:0 18px;
  border-radius:16px;
  font-size:18px;
  white-space:nowrap;
}
.btn-azul{
  background:linear-gradient(180deg,var(--azul-claro),var(--azul));
  box-shadow:0 6px 0 var(--azul-esc);
}
.btn-laranja{
  background:linear-gradient(180deg,var(--laranja),#b95825);
  box-shadow:0 6px 0 #8d3e18;
}
.btn-verde{
  background:linear-gradient(180deg,#67B984,var(--verde));
  box-shadow:0 6px 0 #2F6F4D;
}
.mesa{
  min-height:0;
  display:grid;
  grid-template-columns:minmax(260px,.75fr) minmax(520px,1.25fr);
  gap:12px;
}
.painel{
  min-height:0;
  background:var(--branco);
  border:3px solid var(--bege-esc);
  border-radius:20px;
  box-shadow:0 7px 0 var(--bege-esc),0 14px 26px rgba(94,65,34,.14);
}
.lado-conta{
  padding:12px;
  display:grid;
  grid-template-rows:auto auto 1fr auto;
  gap:10px;
}
.mensagem{
  min-height:56px;
  display:grid;
  place-items:center;
  text-align:center;
  padding:6px 10px;
  background:#fffaf0;
  border:3px solid var(--bege);
  border-radius:16px;
  font-size:clamp(18px,2.6vw,24px);
  line-height:1.08;
  font-weight:900;
}
.mensagem strong{
  color:var(--azul-esc);
  font-family:"Baloo 2",Nunito,sans-serif;
}
.conta{
  justify-self:center;
  width:min(330px,100%);
  background:#fffaf0;
  border:3px solid var(--bege);
  border-radius:18px;
  padding:12px;
}
.colunas{
  display:grid;
  grid-template-columns:42px 1fr 1fr;
  gap:7px;
  align-items:center;
}
.cabeca{
  min-height:28px;
  display:grid;
  place-items:center;
  color:#9a704f;
  font-size:14px;
  font-weight:900;
  text-transform:uppercase;
}
.sinal{
  min-height:50px;
  display:grid;
  place-items:center;
  font-family:"Baloo 2",Nunito,sans-serif;
  font-size:34px;
  line-height:1;
}
.digito,.vaium,.resultado{
  min-height:52px;
  display:grid;
  place-items:center;
  border-radius:14px;
  font-family:"Baloo 2",Nunito,sans-serif;
  font-size:43px;
  line-height:1;
  font-weight:900;
}
.digito{
  background:var(--branco);
  border:3px solid var(--bege);
  color:var(--azul);
}
.vaium{
  min-height:42px;
  background:#F8E7A3;
  border:3px solid #D8B954;
  color:#8D6E16;
  font-size:31px;
  opacity:.22;
}
.vaium.ativo{opacity:1}
.linha{
  grid-column:1 / -1;
  height:5px;
  background:var(--marrom);
  border-radius:10px;
}
.resultado{
  background:#EDF8FF;
  border:3px solid var(--azul-claro);
  color:var(--azul-esc);
}
.resultado.pronto{
  background:#EAF7EF;
  border-color:#67B984;
  color:#2F6F4D;
}
.feedback{
  display:grid;
  place-items:center;
  text-align:center;
  min-height:74px;
  padding:8px;
  font-family:"Baloo 2",Nunito,sans-serif;
  font-size:clamp(22px,3.5vw,32px);
  line-height:1.02;
  color:var(--verde);
  font-weight:900;
}
.feedback.neutro{color:var(--marrom)}
.controles{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.tabuleiro{
  padding:12px;
  display:grid;
  grid-template-rows:minmax(0,1fr) minmax(0,1fr) auto;
  gap:10px;
}
.area{
  min-height:0;
  display:grid;
  grid-template-columns:1fr 42px 1fr;
  gap:10px;
  align-items:stretch;
  background:#fffaf0;
  border:3px solid var(--bege);
  border-radius:18px;
  padding:10px;
}
.coluna-area{
  min-height:0;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:8px;
}
.area-titulo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-size:17px;
  font-weight:900;
  color:#9a704f;
}
.contador{
  min-width:44px;
  min-height:34px;
  display:grid;
  place-items:center;
  border-radius:12px;
  background:var(--branco);
  border:3px solid var(--bege);
  font-family:"Baloo 2",Nunito,sans-serif;
  font-size:25px;
  line-height:1;
  color:var(--azul-esc);
}
.caixa{
  min-height:0;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-content:flex-start;
  align-items:flex-start;
  padding:8px;
  border-radius:15px;
  background:var(--branco);
  border:3px dashed var(--bege);
  overflow:hidden;
}
.caixa.origem{
  display:grid;
  align-content:start;
  gap:7px;
}
.seta{
  display:grid;
  place-items:center;
  font-family:"Baloo 2",Nunito,sans-serif;
  font-size:32px;
  color:var(--azul);
}
.linha-blocos{
  display:flex;
  align-items:center;
  gap:7px;
  min-height:48px;
}
.linha-nome{
  width:58px;
  flex:0 0 58px;
  font-size:14px;
  font-weight:900;
  color:#9a704f;
}
.bloco-numero{
  min-width:54px;
  height:46px;
  display:grid;
  place-items:center;
  border-radius:13px;
  border:3px solid rgba(91,54,24,.24);
  box-shadow:0 5px 0 rgba(91,54,24,.22);
  color:#fff;
  font-family:"Baloo 2",Nunito,sans-serif;
  font-size:27px;
  line-height:1;
}
.bloco-numero.vazio{
  opacity:.24;
  box-shadow:none;
}
.unidade{
  width:38px;
  height:38px;
  display:grid;
  place-items:center;
  border-radius:10px;
  border:3px solid rgba(91,54,24,.24);
  box-shadow:0 4px 0 rgba(91,54,24,.22);
  color:#fff;
  font-family:"Baloo 2",Nunito,sans-serif;
  font-size:21px;
  font-weight:900;
}
.dezena{
  width:42px;
  height:96px;
  display:grid;
  grid-template-rows:repeat(10,1fr);
  border-radius:11px;
  overflow:hidden;
  border:3px solid #243B83;
  box-shadow:0 5px 0 rgba(36,59,131,.32);
  background:var(--indigo);
}
.dezena span{
  border-bottom:1px solid rgba(255,255,255,.38);
  background:linear-gradient(180deg,#4F68C9,var(--indigo));
}
.dezena span:last-child{border-bottom:0}
.dezena-btn{
  width:42px;
  height:96px;
  padding:0;
  border-radius:11px;
  background:var(--indigo);
  border:3px solid #243B83;
  box-shadow:0 5px 0 rgba(36,59,131,.32);
}
.dezena-btn::before{
  content:"";
  display:block;
  width:100%;
  height:100%;
  border-radius:8px;
  background:repeating-linear-gradient(180deg,#4F68C9 0,#4F68C9 8px,#3650AD 9px,#3650AD 10px);
}
.acoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.btn-grande{
  min-height:62px;
  border-radius:18px;
  font-size:clamp(18px,2.6vw,24px);
}
@media (max-width:860px){
  html,body{overflow:auto}
  .app{height:auto}
  .topo{grid-template-columns:56px 1fr}
  .topo .btn{grid-column:1 / -1}
  .capa{width:56px;height:56px}
  .mesa{grid-template-columns:1fr}
  .area{grid-template-columns:1fr;gap:8px}
  .seta{min-height:24px}
  .controles,.acoes{grid-template-columns:1fr}
}
</style>

<body>
<main class="app">
  <header class="topo">
    <img class="capa" src="../assets/img/capa-guga.jpg" alt="Guga">
    <div>
      <h1 class="titulo">Vamos somar: <span>sobe um</span></h1>
      <p class="subtitulo">Pegue os blocos de baixo e monte a soma em cima.</p>
    </div>
    <button id="btn-novo" class="btn btn-laranja" type="button">Nova conta</button>
  </header>

  <section class="mesa">
    <aside class="painel lado-conta">
      <div id="mensagem" class="mensagem">Some as <strong>unidades</strong>.</div>
      <div class="conta" aria-label="Conta armada">
        <div class="colunas">
          <div></div>
          <div class="cabeca">Dezenas</div>
          <div class="cabeca">Unidades</div>
          <div></div>
          <div id="vai-um" class="vaium">1</div>
          <div></div>
          <div></div>
          <div id="dez-a" class="digito">1</div>
          <div id="uni-a" class="digito">6</div>
          <div class="sinal">+</div>
          <div id="dez-b" class="digito">2</div>
          <div id="uni-b" class="digito">5</div>
          <div class="linha"></div>
          <div></div>
          <div id="res-dez" class="resultado">?</div>
          <div id="res-uni" class="resultado">?</div>
        </div>
      </div>
      <div id="feedback" class="feedback neutro">Clique no bloco de unidades.</div>
      <div class="controles">
        <button id="btn-recomecar" class="btn btn-azul" type="button">Recomeçar</button>
        <button id="btn-limpar" class="btn btn-laranja" type="button">Mesma conta</button>
      </div>
    </aside>

    <section class="painel tabuleiro" aria-label="Blocos para somar">
      <div class="area" aria-label="Unidades">
        <div class="coluna-area">
          <div class="area-titulo">Somando unidades <span id="contador-unidades" class="contador">0</span></div>
          <div id="unidades-soma" class="caixa" aria-label="Unidades somadas"></div>
        </div>
        <div class="seta">↑</div>
        <div class="coluna-area">
          <div class="area-titulo">Unidades da conta</div>
          <div id="unidades-origem" class="caixa origem" aria-label="Unidades da conta"></div>
        </div>
      </div>

      <div class="area" aria-label="Dezenas">
        <div class="coluna-area">
          <div class="area-titulo">Somando dezenas <span id="contador-dezenas" class="contador">0</span></div>
          <div id="dezenas-soma" class="caixa" aria-label="Dezenas somadas"></div>
        </div>
        <div class="seta">↑</div>
        <div class="coluna-area">
          <div class="area-titulo">Dezenas da conta</div>
          <div id="dezenas-origem" class="caixa origem" aria-label="Dezenas da conta"></div>
        </div>
      </div>

      <div class="acoes">
        <button id="btn-unidade" class="btn-grande btn-verde" type="button">Colocar unidade</button>
        <button id="btn-dezena" class="btn-grande btn-azul" type="button" disabled>Colocar dezena</button>
      </div>
    </section>
  </section>
</main>

<script>
const cores = {
  1:"#C84040",
  2:"#D4733A",
  3:"#F2C94C",
  4:"#4A9B6F",
  5:"#2F7FC0",
  6:"#33A6A6",
  7:"#8E5AD7",
  8:"#E66A9F",
  9:"#8B5E3C",
  10:"#3752A3"
};

const el = {
  mensagem:document.getElementById("mensagem"),
  vaiUm:document.getElementById("vai-um"),
  dezA:document.getElementById("dez-a"),
  uniA:document.getElementById("uni-a"),
  dezB:document.getElementById("dez-b"),
  uniB:document.getElementById("uni-b"),
  resDez:document.getElementById("res-dez"),
  resUni:document.getElementById("res-uni"),
  feedback:document.getElementById("feedback"),
  unidadesSoma:document.getElementById("unidades-soma"),
  unidadesOrigem:document.getElementById("unidades-origem"),
  dezenasSoma:document.getElementById("dezenas-soma"),
  dezenasOrigem:document.getElementById("dezenas-origem"),
  contadorUnidades:document.getElementById("contador-unidades"),
  contadorDezenas:document.getElementById("contador-dezenas"),
  btnUnidade:document.getElementById("btn-unidade"),
  btnDezena:document.getElementById("btn-dezena"),
  btnNovo:document.getElementById("btn-novo"),
  btnRecomecar:document.getElementById("btn-recomecar"),
  btnLimpar:document.getElementById("btn-limpar")
};

let conta;
let unidadesOrigem = [];
let dezenasOrigem = [];
let unidadesContadas = 0;
let unidadesSoltas = 0;
let dezenasQueSubiram = 0;
let dezenasContadas = 0;
let dezenasFinalizadas = false;

function numeroAleatorio(min,max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function novaConta(){
  let a;
  let b;
  do{
    a = numeroAleatorio(11,48);
    b = numeroAleatorio(11,48);
  }while((a % 10) + (b % 10) < 10 || a + b > 99);
  conta = {
    a,
    b,
    dezA:Math.floor(a / 10),
    uniA:a % 10,
    dezB:Math.floor(b / 10),
    uniB:b % 10
  };
  reiniciarMesmaConta();
}

function reiniciarMesmaConta(){
  unidadesOrigem = [
    { nome:"1o", valor:conta.uniA },
    { nome:"2o", valor:conta.uniB }
  ];
  dezenasOrigem = [
    { nome:"1o", valor:conta.dezA, tipo:"conta" },
    { nome:"2o", valor:conta.dezB, tipo:"conta" }
  ];
  unidadesContadas = 0;
  unidadesSoltas = 0;
  dezenasQueSubiram = 0;
  dezenasContadas = 0;
  dezenasFinalizadas = false;

  el.dezA.textContent = conta.dezA;
  el.uniA.textContent = conta.uniA;
  el.dezB.textContent = conta.dezB;
  el.uniB.textContent = conta.uniB;
  el.vaiUm.classList.remove("ativo");
  el.resUni.textContent = "?";
  el.resDez.textContent = "?";
  el.resUni.classList.remove("pronto");
  el.resDez.classList.remove("pronto");
  el.unidadesSoma.innerHTML = "";
  el.dezenasSoma.innerHTML = "";
  el.btnUnidade.disabled = false;
  el.btnDezena.disabled = true;
  el.mensagem.innerHTML = "Some as <strong>unidades</strong>.";
  el.feedback.className = "feedback neutro";
  el.feedback.textContent = "Clique no bloco de unidades.";
  desenharTudo();
}

function criarUnidade(valor, texto){
  const bloco = document.createElement("div");
  bloco.className = "unidade";
  bloco.style.background = cores[valor] || cores[1];
  bloco.textContent = texto ?? valor;
  return bloco;
}

function criarBlocoNumero(valor, onClick){
  const bloco = document.createElement("button");
  bloco.type = "button";
  bloco.className = "bloco-numero";
  bloco.style.background = cores[Math.max(1, valor)] || cores[1];
  bloco.textContent = valor;
  if(valor <= 0){
    bloco.classList.add("vazio");
    bloco.disabled = true;
  }else{
    bloco.addEventListener("click", onClick);
  }
  return bloco;
}

function criarDezena(){
  const dezena = document.createElement("div");
  dezena.className = "dezena";
  for(let i = 0; i < 10; i++){
    dezena.appendChild(document.createElement("span"));
  }
  return dezena;
}

function criarDezenaBotao(onClick){
  const botao = document.createElement("button");
  botao.type = "button";
  botao.className = "dezena-btn";
  botao.addEventListener("click", onClick);
  return botao;
}

function criarLinha(nome){
  const linha = document.createElement("div");
  linha.className = "linha-blocos";
  const label = document.createElement("div");
  label.className = "linha-nome";
  label.textContent = nome;
  linha.appendChild(label);
  return linha;
}

function desenharUnidadesOrigem(){
  el.unidadesOrigem.innerHTML = "";
  unidadesOrigem.forEach((grupo, indice) => {
    const linha = criarLinha(grupo.nome);
    linha.appendChild(criarBlocoNumero(grupo.valor, () => colocarUnidade(indice)));
    el.unidadesOrigem.appendChild(linha);
  });
}

function desenharDezenasOrigem(){
  el.dezenasOrigem.innerHTML = "";
  dezenasOrigem.forEach((grupo, indice) => {
    const linha = criarLinha(grupo.nome);
    if(grupo.valor <= 0){
      const vazio = criarBlocoNumero(0, () => {});
      linha.appendChild(vazio);
    }else{
      for(let i = 0; i < grupo.valor; i++){
        linha.appendChild(criarDezenaBotao(() => colocarDezena(indice)));
      }
    }
    el.dezenasOrigem.appendChild(linha);
  });
}

function desenharTudo(){
  el.contadorUnidades.textContent = unidadesSoltas;
  el.contadorDezenas.textContent = dezenasContadas;
  desenharUnidadesOrigem();
  desenharDezenasOrigem();
}

function escolherGrupoUnidade(){
  return unidadesOrigem.findIndex(grupo => grupo.valor > 0);
}

function colocarUnidade(indice){
  const totalUnidades = conta.uniA + conta.uniB;
  if(unidadesContadas >= totalUnidades) return;
  const grupoIndice = Number.isInteger(indice) ? indice : escolherGrupoUnidade();
  const grupo = unidadesOrigem[grupoIndice];
  if(!grupo || grupo.valor <= 0) return;

  grupo.valor--;
  unidadesContadas++;
  unidadesSoltas++;

  if(unidadesSoltas === 10){
    el.unidadesSoma.innerHTML = "";
    dezenasQueSubiram = 1;
    unidadesSoltas = 0;
    el.vaiUm.classList.add("ativo");
    if(!dezenasOrigem.some(grupo => grupo.tipo === "sobe")){
      dezenasOrigem.push({ nome:"sobe", valor:1, tipo:"sobe" });
    }
    el.feedback.className = "feedback";
    el.feedback.textContent = "Muito bem! Dez unidades viraram uma dezena.";
  }else{
    el.unidadesSoma.appendChild(criarUnidade(unidadesSoltas, unidadesSoltas));
    el.feedback.className = "feedback neutro";
    el.feedback.textContent = `${unidadesSoltas} unidade${unidadesSoltas === 1 ? "" : "s"}.`;
  }

  if(unidadesContadas === totalUnidades){
    el.resUni.textContent = unidadesSoltas;
    el.resUni.classList.add("pronto");
    el.btnUnidade.disabled = true;
    el.btnDezena.disabled = false;
    el.mensagem.innerHTML = "Agora some as <strong>dezenas</strong>.";
    el.feedback.className = "feedback";
    el.feedback.textContent = `Fica ${unidadesSoltas} nas unidades.`;
  }

  desenharTudo();
}

function escolherGrupoDezena(){
  return dezenasOrigem.findIndex(grupo => grupo.valor > 0);
}

function colocarDezena(indice){
  if(dezenasFinalizadas) return;
  const grupoIndice = Number.isInteger(indice) ? indice : escolherGrupoDezena();
  const grupo = dezenasOrigem[grupoIndice];
  if(!grupo || grupo.valor <= 0) return;

  grupo.valor--;
  dezenasContadas++;
  el.dezenasSoma.appendChild(criarDezena());
  el.feedback.className = "feedback neutro";
  el.feedback.textContent = `${dezenasContadas} dezena${dezenasContadas === 1 ? "" : "s"}.`;

  if(dezenasContadas === conta.dezA + conta.dezB + dezenasQueSubiram){
    finalizarDezenas();
  }
  desenharTudo();
}

function finalizarDezenas(){
  dezenasFinalizadas = true;
  el.resDez.textContent = conta.dezA + conta.dezB + dezenasQueSubiram;
  el.resDez.classList.add("pronto");
  el.btnDezena.disabled = true;
  el.mensagem.innerHTML = "A conta ficou <strong>pronta</strong>.";
  el.feedback.className = "feedback";
  el.feedback.textContent = `Muito bem! ${conta.a} + ${conta.b} = ${conta.a + conta.b}.`;
}

el.btnUnidade.addEventListener("click", () => colocarUnidade());
el.btnDezena.addEventListener("click", () => colocarDezena());
el.btnNovo.addEventListener("click", novaConta);
el.btnRecomecar.addEventListener("click", reiniciarMesmaConta);
el.btnLimpar.addEventListener("click", reiniciarMesmaConta);

novaConta();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('../service-worker.js'));
}
</script>
</body>
