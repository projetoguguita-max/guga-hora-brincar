<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Calculadora do Guga - Vamos Tirar v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap');
:root{
  --creme:#F5EDD8;--bege:#E8D9B8;--bege-esc:#C8B890;--marrom:#8B5E3C;
  --marrom-cl:#C4895A;--azul:#2F7FC0;--azul-cl:#5BA8E0;--azul-esc:#1A5A90;
  --verde:#4A9B6F;--verde-cl:#7DC49A;--verde-esc:#236b45;--amarelo:#E8B840;
  --laranja:#D4733A;--rosa:#C85A7A;--roxo:#7A5AB8;--vermelho:#C84040;
  --texto:#2A1A0A;--cinza:#8A7A6A;--branco:#FFFDF8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;
  font-family:'Nunito',sans-serif;
  background:
    radial-gradient(ellipse at 18% 8%,rgba(196,137,90,.14) 0%,transparent 48%),
    radial-gradient(ellipse at 82% 92%,rgba(47,127,192,.12) 0%,transparent 50%),
    var(--creme);
  color:var(--texto);
  overflow-x:hidden;
}
main{
  min-height:100vh;
  width:min(100%,900px);
  margin:0 auto;
  padding:18px 14px 24px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.topo{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:14px;
  align-items:center;
}
.capa{
  width:86px;
  height:86px;
  border-radius:20px;
  object-fit:cover;
  border:4px solid var(--bege-esc);
  box-shadow:0 8px 24px rgba(139,94,60,.22);
}
.titulo{
  font-family:'Baloo 2',cursive;
  font-size:clamp(30px,7vw,48px);
  line-height:1;
  font-weight:900;
  color:var(--marrom);
}
.titulo span{color:var(--azul)}
.sub{
  margin-top:4px;
  color:var(--cinza);
  font-size:16px;
  font-weight:800;
}
.painel{
  background:var(--branco);
  border:3px solid var(--bege-esc);
  border-radius:20px;
  box-shadow:0 5px 0 var(--bege-esc),0 8px 22px rgba(0,0,0,.06);
}
.config{
  padding:14px;
  display:grid;
  grid-template-columns:1fr 1fr auto;
  gap:10px;
  align-items:end;
}
label{
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:13px;
  font-weight:900;
  color:var(--marrom);
  text-transform:uppercase;
  letter-spacing:.3px;
}
input{
  width:100%;
  height:58px;
  border:3px solid var(--azul-cl);
  border-radius:15px;
  background:var(--branco);
  color:var(--texto);
  font:900 28px 'Nunito',sans-serif;
  text-align:center;
  outline:none;
}
input:focus{border-color:var(--azul);box-shadow:0 0 0 4px rgba(47,127,192,.14)}
button{
  border:none;
  border-radius:99px;
  font:900 18px 'Nunito',sans-serif;
  cursor:pointer;
  transition:transform .1s,box-shadow .1s,opacity .15s;
  touch-action:manipulation;
}
button:active{transform:translateY(3px)}
.btn-pronto{
  min-height:58px;
  padding:0 24px;
  background:var(--marrom-cl);
  color:white;
  box-shadow:0 5px 0 var(--marrom);
}
.placar{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:10px;
  align-items:center;
  padding:14px;
}
.numero-box{
  min-height:112px;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(47,127,192,.12),rgba(125,196,154,.13));
  border:3px solid var(--azul-cl);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.numero-label{
  font-size:13px;
  font-weight:900;
  color:var(--azul-esc);
  text-transform:uppercase;
  letter-spacing:.4px;
}
.numero{
  font-family:'Baloo 2',cursive;
  font-size:64px;
  font-weight:900;
  line-height:.95;
  color:var(--azul-esc);
}
.sinal{
  width:54px;
  height:54px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:var(--laranja);
  color:white;
  font:900 34px 'Baloo 2',cursive;
  box-shadow:0 5px 0 #a0521a;
}
.texto-guia{
  padding:12px 16px;
  text-align:center;
  font-size:22px;
  font-weight:900;
  color:var(--marrom);
}
.texto-guia strong{color:var(--vermelho)}
.bolinhas{
  padding:16px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(54px,1fr));
  gap:12px;
  align-items:center;
}
.bola{
  aspect-ratio:1;
  min-height:54px;
  border-radius:50%;
  border:4px solid var(--azul-esc);
  background:
    radial-gradient(circle at 35% 28%,rgba(255,255,255,.75),transparent 26%),
    var(--azul);
  box-shadow:0 6px 0 var(--azul-esc),0 9px 16px rgba(0,0,0,.08);
  display:grid;
  place-items:center;
  color:white;
  font:900 20px 'Nunito',sans-serif;
  user-select:none;
  transform:translateY(0);
  transition:transform .16s ease,opacity .18s ease,background .18s,border-color .18s,box-shadow .18s;
}
.bola.tirar{
  border-color:#9a2020;
  background:
    radial-gradient(circle at 35% 28%,rgba(255,255,255,.75),transparent 26%),
    var(--vermelho);
  box-shadow:0 6px 0 #9a2020,0 9px 16px rgba(0,0,0,.08);
  cursor:pointer;
  animation:pulsar 1.4s ease-in-out infinite;
}
.bola.tirar.escondida{
  border-color:var(--azul-esc);
  background:
    radial-gradient(circle at 35% 28%,rgba(255,255,255,.75),transparent 26%),
    var(--azul);
  box-shadow:0 6px 0 var(--azul-esc),0 9px 16px rgba(0,0,0,.08);
  animation:none;
}
.bola.tirada{
  opacity:0;
  transform:scale(.25) translateY(16px);
  pointer-events:none;
}
@keyframes pulsar{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.resultado{
  display:none;
  padding:16px;
  border-color:var(--verde-cl);
  box-shadow:0 5px 0 var(--verde-cl),0 8px 22px rgba(0,0,0,.06);
  text-align:center;
}
.resultado.ativo{display:block;animation:entrar .28s ease}
@keyframes entrar{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.resultado h2{
  font-family:'Baloo 2',cursive;
  font-size:42px;
  color:var(--verde-esc);
  line-height:1.05;
}
.resultado p{
  margin-top:4px;
  font-size:24px;
  font-weight:900;
  color:var(--texto);
}
.acoes{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.btn-novo,.btn-repetir{
  min-height:52px;
  padding:0 26px;
  color:white;
}
.btn-novo{background:var(--azul);box-shadow:0 5px 0 var(--azul-esc)}
.btn-repetir{background:var(--verde);box-shadow:0 5px 0 var(--verde-esc)}
@media(max-width:640px){
  main{padding:14px 10px 20px}
  .topo{grid-template-columns:72px 1fr;gap:10px}
  .capa{width:72px;height:72px;border-radius:17px}
  .config{grid-template-columns:1fr 1fr}
  .btn-pronto{grid-column:1/-1}
  .placar{grid-template-columns:1fr auto 1fr;padding:10px}
  .numero-box{min-height:92px}
  .numero{font-size:50px}
  .sinal{width:44px;height:44px;font-size:28px}
  .texto-guia{font-size:19px}
  .bolinhas{grid-template-columns:repeat(auto-fit,minmax(46px,1fr));gap:10px;padding:12px}
  .bola{min-height:46px;font-size:17px;border-width:3px}
}
</style>

<!-- Google Analytics 4 — Projeto Guguita -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-357V6N6RQ1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-357V6N6RQ1');
</script>
</head>
<body>
<main>
  <section class="topo">
    <img class="capa" src="../assets/img/capa-guga.jpg" alt="Guga">
    <div>
      <h1 class="titulo">Vamos <span>tirar</span></h1>
      <p class="sub">Toque nas bolinhas para tirar e veja quanto sobra.</p>
    </div>
  </section>

  <section class="painel config" aria-label="Escolher conta">
    <label>
      Tenho
      <input id="base" type="number" inputmode="numeric" min="1" max="100" value="17">
    </label>
    <label>
      Vou tirar
      <input id="tirar" type="number" inputmode="numeric" min="1" max="100" value="8">
    </label>
    <button class="btn-pronto" id="montar">Montar</button>
  </section>

  <section class="painel placar" aria-live="polite">
    <div class="numero-box">
      <div class="numero-label">Agora tem</div>
      <div class="numero" id="atual">17</div>
    </div>
    <div class="sinal">-</div>
    <div class="numero-box">
      <div class="numero-label">Falta tirar</div>
      <div class="numero" id="falta">8</div>
    </div>
  </section>

  <section class="painel">
    <p class="texto-guia" id="guia">Vamos tirar <strong>8</strong> bolinhas.</p>
    <div class="bolinhas" id="bolinhas" aria-label="Bolinhas da subtracao"></div>
  </section>

  <section class="painel resultado" id="resultado" aria-live="polite">
    <h2>Muito bem!</h2>
    <p id="conta-final">17 - 8 = 9</p>
    <div class="acoes">
      <button class="btn-repetir" id="repetir">Repetir</button>
      <button class="btn-novo" id="novo">Nova conta</button>
    </div>
  </section>
</main>

<script>
const baseEl=document.getElementById('base');
const tirarEl=document.getElementById('tirar');
const atualEl=document.getElementById('atual');
const faltaEl=document.getElementById('falta');
const guiaEl=document.getElementById('guia');
const bolinhasEl=document.getElementById('bolinhas');
const resultadoEl=document.getElementById('resultado');
const contaFinalEl=document.getElementById('conta-final');
let base=17,tirar=8,atual=17,falta=8;

function limitar(n,min,max){
  n=parseInt(n,10);
  if(Number.isNaN(n))return min;
  return Math.max(min,Math.min(max,n));
}

function montar(){
  base=limitar(baseEl.value,1,100);
  tirar=limitar(tirarEl.value,1,base);
  baseEl.value=base;
  tirarEl.value=tirar;
  atual=base;
  falta=tirar;
  atualEl.textContent=atual;
  faltaEl.textContent=falta;
  guiaEl.innerHTML=`Vamos tirar <strong>${tirar}</strong> bolinha${tirar===1?'':'s'}.`;
  resultadoEl.classList.remove('ativo');
  bolinhasEl.innerHTML='';
  for(let i=1;i<=base;i++){
    const vaiTirar=i>base-tirar;
    const b=document.createElement('button');
    b.className='bola'+(vaiTirar?' tirar escondida':'');
    b.type='button';
    b.setAttribute('aria-label',vaiTirar?'Tirar bolinha '+i:'Bolinha '+i+' que vai sobrar');
    b.textContent=i;
    if(vaiTirar)b.addEventListener('click',()=>tirarBola(b));
    bolinhasEl.appendChild(b);
  }
}

function tirarBola(bola){
  if(!bola.classList.contains('tirar')||bola.classList.contains('tirada')||falta<=0)return;
  bola.classList.add('tirada');
  falta--;
  atual--;
  atualEl.textContent=atual;
  faltaEl.textContent=falta;
  if(falta===0){
    guiaEl.innerHTML=`Sobraram <strong style="color:var(--verde-esc)">${atual}</strong> bolinha${atual===1?'':'s'}.`;
    contaFinalEl.textContent=`${base} - ${tirar} = ${atual}`;
    setTimeout(()=>resultadoEl.classList.add('ativo'),260);
    gtag('event','jogo_concluido',{jogo_nome:'calculadora-tirar',jogo_categoria:'matematica'});
  }
}

function novaConta(){
  const b=Math.floor(Math.random()*91)+10;
  const t=Math.floor(Math.random()*(b-3))+2;
  baseEl.value=b;
  tirarEl.value=t;
  montar();
}

document.getElementById('montar').addEventListener('click',montar);
document.getElementById('repetir').addEventListener('click',montar);
document.getElementById('novo').addEventListener('click',novaConta);
baseEl.addEventListener('change',montar);
tirarEl.addEventListener('change',montar);
montar();
</script>
</body>
</html>
